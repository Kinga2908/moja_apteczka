<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediMate 💊</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
        nav { background: #2c7a4b; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        nav a { color: white; text-decoration: none; margin-right: 20px; font-weight: bold; }
        nav a:hover { text-decoration: underline; }
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: #2c7a4b; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #2c7a4b; color: white; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #ddd; }
        tr:hover { background: #f9f9f9; }
        .btn { background: #2c7a4b; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; display: inline-block; margin-top: 10px; }
        .btn:hover { background: #235f3a; }
    </style>
</head>
<body>
    <nav>
        🌿 <a href="{% url 'strona_glowna' %}">MediMate</a>
        <a href="{% url 'dodaj_lek' %}">+ Dodaj lek</a>
        <a href="{% url 'dodaj_przyjecie' %}">+ Przyjęcie leku</a>
        <a href="{% url 'edytuj_profil' %}">👤 Profil</a>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
