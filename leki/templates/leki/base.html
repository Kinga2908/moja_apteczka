{% load static %}
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediMate 💊</title>
    <link rel="stylesheet" href="{% static 'leki/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'leki/css/all.min.css' %}">
    <style>
        body { background: #f0f7f4; }
        .navbar { background: #2c7a4b !important; }
        .navbar-brand, .nav-link { color: white !important; }
        .nav-link:hover { color: #c8e6c9 !important; }
        .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .btn-primary { background: #2c7a4b; border-color: #2c7a4b; }
        .btn-primary:hover { background: #235f3a; border-color: #235f3a; }
        h1, h2 { color: #2c7a4b; }
        .table thead { background: #2c7a4b; color: white; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'strona_glowna' %}">
                <i class="fas fa-pills me-2"></i>MediMate
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'lista_lekow' %}">
                            <i class="fas fa-capsules me-1"></i>Lista leków
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'lista_przyjec' %}">
                            <i class="fas fa-history me-1"></i>Historia przyjęć
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'dodaj_lek' %}">
                            <i class="fas fa-plus-circle me-1"></i>Dodaj lek
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'dodaj_przyjecie' %}">
                            <i class="fas fa-clock me-1"></i>Przyjęcie leku
                        </a>
                    </li>
                    {% if user.is_authenticated %}
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'edytuj_profil' %}">
                            <i class="fas fa-user me-1"></i>{{ user.username }}
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'wylogowanie' %}">
                            <i class="fas fa-sign-out-alt me-1"></i>Wyloguj
                        </a>
                    </li>
                    {% else %}
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'logowanie' %}">
                            <i class="fas fa-sign-in-alt me-1"></i>Logowanie
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'rejestracja' %}">
                            <i class="fas fa-user-plus me-1"></i>Rejestracja
                        </a>
                    </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script src="{% static 'leki/js/bootstrap.min.js' %}"></script>
</body>
</html>
